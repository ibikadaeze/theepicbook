---
- name: Install Node.js and npm
  apt:
    name:
      - nodejs
      - npm
      - git
      - default-mysql-client
    state: present
    update_cache: yes

- name: Ensure application parent directory exists
  file:
    path: "{{ app_dest | dirname }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Ensure application directory exists
  file:
    dest: "{{ app_dest }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Copy existing EpicBook app folder to target VM
  copy:
    src: "{{ app_src }}/"
    dest: "{{ app_dest }}/"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: preserve
  notify: Restart epicbook

- name: Install npm dependencies
  npm:
    path: "{{ app_dest }}"
    production: no
  notify: Restart epicbook

- name: Set application ownership
  file:
    path: "{{ app_dest }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Deploy EpicBook database config
  template:
    src: config.json.j2
    dest: "{{ app_dest }}/config/config.json"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'
  notify: Restart epicbook

- name: Install EpicBook systemd unit
  template:
    src: epicbook.service.j2
    dest: /etc/systemd/system/epicbook.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart epicbook

- name: Ensure EpicBook service is enabled and started
  systemd:
    name: epicbook
    enabled: yes
    state: started
    daemon_reload: yes

- name: Check whether EpicBook tables already exist
  shell: >
    mysql
    --ssl-mode=REQUIRED
    -h {{ db_hostname }}
    -u {{ db_admin_username }}
    -D {{ db_name }}
    -Nse "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='{{ db_name }}' AND table_name IN ('Author','Book');"
  environment:
    MYSQL_PWD: "{{ db_password }}"
  register: epicbook_tables
  changed_when: false

- name: Load EpicBook schema from db folder
  shell: >
    sed "s/`bookstore`/`{{ db_name }}`/g; s/USE bookstore;/USE {{ db_name }};/g" {{ app_dest }}/db/BuyTheBook_Schema.sql |
    mysql
    --ssl-mode=REQUIRED
    -h {{ db_hostname }}
    -u {{ db_admin_username }}
    {{ db_name }}
  environment:
    MYSQL_PWD: "{{ db_password }}"
  when: epicbook_tables.stdout | trim != "2"

- name: Check whether books have already been seeded
  shell: >
    mysql
    --ssl-mode=REQUIRED
    -h {{ db_hostname }}
    -u {{ db_admin_username }}
    -D {{ db_name }}
    -Nse "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='{{ db_name }}' AND table_name='Book';"
  environment:
    MYSQL_PWD: "{{ db_password }}"
  register: epicbook_book_table
  changed_when: false

- name: Check whether books have already been seeded
  shell: >
    mysql
    --ssl-mode=REQUIRED
    -h {{ db_hostname }}
    -u {{ db_admin_username }}
    -D {{ db_name }}
    -Nse "SELECT COUNT(*) FROM Book;"
  environment:
    MYSQL_PWD: "{{ db_password }}"
  register: epicbook_book_count
  changed_when: false
  when: epicbook_book_table.stdout | trim == "1"

- name: Seed authors from author.csv
  shell: >
    iconv -f latin1 -t utf-8 {{ app_dest }}/db/author.csv > /tmp/author_utf8.csv &&
    mysql
    --local-infile=1
    --default-character-set=utf8mb4
    --ssl-mode=REQUIRED
    -h {{ db_hostname }}
    -u {{ db_admin_username }}
    -D {{ db_name }}
    -e "LOAD DATA LOCAL INFILE '/tmp/author_utf8.csv' INTO TABLE Author CHARACTER SET utf8mb4 FIELDS TERMINATED BY ',' OPTIONALLY ENCLOSED BY '\"' LINES TERMINATED BY '\n' IGNORE 1 LINES (id, firstName, lastName);"
  environment:
    MYSQL_PWD: "{{ db_password }}"
  when:
    - epicbook_book_table.stdout | trim == "1"
    - epicbook_book_count.stdout | trim == "0"

- name: Seed books from books.csv
  shell: >
    iconv -f latin1 -t utf-8 {{ app_dest }}/db/books.csv > /tmp/books_utf8.csv &&
    mysql
    --local-infile=1
    --default-character-set=utf8mb4
    --ssl-mode=REQUIRED
    -h {{ db_hostname }}
    -u {{ db_admin_username }}
    -D {{ db_name }}
    -e "LOAD DATA LOCAL INFILE '/tmp/books_utf8.csv' INTO TABLE Book CHARACTER SET utf8mb4 FIELDS TERMINATED BY ',' OPTIONALLY ENCLOSED BY '\"' LINES TERMINATED BY '\n' IGNORE 1 LINES (id, title, genre, pubYear, price, inventory, bookDescription, AuthorId);"
  environment:
    MYSQL_PWD: "{{ db_password }}"
  when:
    - epicbook_book_table.stdout | trim == "1"
    - epicbook_book_count.stdout | trim == "0"
