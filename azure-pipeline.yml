trigger:
  branches:
    include:
      - main

stages:
  - stage: DeployApp
    displayName: "Deploy EpicBook to App VM"
    jobs:
      - job: App_Deployment
        displayName: "Run Ansible Playbook from Self-Hosted Agent VM"
        pool:
          name: "self-hosted-agent-pool"

        steps:
          - script: |
              sudo apt update
              sudo apt install -y ansible
            displayName: "Install Ansible"

          - task: DownloadSecureFile@1
            name: download_ssh_key
            inputs:
              secureFile: "id_rsa"

          - script: |
              mkdir -p ~/.ssh
              cp $(download_ssh_key.secureFilePath) ~/.ssh/id_rsa
              chmod 600 ~/.ssh/id_rsa
              echo "StrictHostKeyChecking no" > ~/.ssh/config
            displayName: "Setup SSH Private Key"

          - script: |
              cd ansible
              echo "Ensure the app VM public IP has been copied into ansible/inventory.ini before running this pipeline."
              ansible-playbook -i inventory.ini site.yml --ssh-extra-args "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
            displayName: "Run Ansible Playbook"
            env:
              ANSIBLE_HOST_KEY_CHECKING: "False"
